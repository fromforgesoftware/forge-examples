name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/petstore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/petstore/go.mod
      - name: build + vet + test (pinned published modules)
        env:
          GOWORK: off
        run: |
          go build ./...
          go vet ./...
          go test ./...
  ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: examples/petstore-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # vue-kit/ts-kit come from GitHub Packages (auth required even when public).
          registry-url: 'https://npm.pkg.github.com'
          scope: '@fromforgesoftware'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx vue-tsc --noEmit
      - run: npx vite build
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: |
          helm lint examples/petstore/deploy/catalog
          helm lint examples/petstore/deploy/adoptions
          helm lint examples/petstore-ui/deploy
