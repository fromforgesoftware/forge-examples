name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: build + vet + test (pinned published modules)
        env:
          GOWORK: off
        run: |
          go build ./...
          go vet ./...
          go test ./...
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: |
          helm lint deploy/catalog
          helm lint deploy/adoptions
