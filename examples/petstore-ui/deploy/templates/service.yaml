apiVersion: v1
kind: Service
metadata:
  name: {{ include "petstore-ui.fullname" . }}
  labels:
    {{- include "petstore-ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "petstore-ui.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
