server {
	listen 8080;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# config.js is rendered at container start and must never be cached, so a
	# redeploy with new env takes effect immediately.
	location = /config.js {
		add_header Cache-Control "no-store, no-cache, must-revalidate";
		expires off;
	}

	# Fingerprinted build assets are immutable — cache hard.
	location /assets/ {
		add_header Cache-Control "public, max-age=31536000, immutable";
	}

	# SPA history fallback: unknown paths return index.html so vue-router can
	# handle client-side routes (e.g. /callback, /pets/:id) on hard refresh.
	location / {
		try_files $uri $uri/ /index.html;
	}
}
