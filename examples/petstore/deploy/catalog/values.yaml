# Default values for the Catalog chart.
nameOverride: ''
fullnameOverride: ''

replicaCount: 3

image:
  repository: ghcr.io/fromforgesoftware/catalog
  pullPolicy: IfNotPresent
  tag: '' # defaults to .Chart.AppVersion

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ''

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

# Ports: REST/OpenAPI.
ports:
  http: 8080

service:
  type: ClusterIP
  httpPort: 80

# Database connection. Catalog owns its own schema (search_path) inside the
# target Postgres; consumers sharing a Postgres MUST use distinct schemas.
database:
  host: ''
  port: '5432'
  name: ''
  schema: catalog
  ssl: require
  # Credentials: reference an existing secret with keys DB_USER/DB_PASSWORD,
  # or set username/password to have the chart create one.
  existingSecret: ''
  username: ''
  password: ''

# aegisIssuer is the realm issuer whose JWKS catalog verifies bearer tokens
# against (e.g. https://aegis/realms/petstore).
aegisIssuer: ''

# Audit sink for state-changing ops (e.g. pet-create): stdout (log events) or
# talos (forward to Talos over gRPC).
auditSink: stdout
talosGRPCAddr: '' # required when auditSink=talos (e.g. forge-talos:9090)

# Pre-install / pre-upgrade migration job (runs /app/migrator).
migrationJob:
  enabled: true
  backoffLimit: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: '1'
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}

# Shared HMAC secret gating /api admin routes to the Foundry gateway
# (empty = open). Must match across Foundry and the products it manages.
gatewaySecret: ''
