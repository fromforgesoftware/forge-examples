replicaCount: 1

image:
  pullPolicy: IfNotPresent

database:
  host: postgres
  port: '5432'
  name: forge
  schema: catalog
  ssl: disable
  username: forge
  password: forge

# In-cluster aegis realm issuer for token verification. Must match the iss
# aegis mints (check the realm discovery doc). See VERIFY.md.
aegisIssuer: 'http://forge-aegis/realms/master'

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: '1'
    memory: 512Mi
