replicaCount: 3

database:
  host: '' # set by the deploy pipeline / env overlay
  name: adoptions
  schema: adoptions
  ssl: require
  existingSecret: adoptions-db

aegisIssuer: 'https://aegis/realms/petstore' # set by the deploy pipeline / env overlay

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 2
