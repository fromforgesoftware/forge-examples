replicaCount: 1

image:
  pullPolicy: IfNotPresent

database:
  host: postgres
  port: '5432'
  name: forge
  schema: adoptions
  ssl: disable
  username: forge
  password: forge

# In-cluster aegis realm issuer for token verification (see VERIFY.md).
aegisIssuer: 'http://forge-aegis/realms/master'

# In-cluster downstream services. Platform deps deploy as forge-<name>;
# petstore projects deploy under their project name (catalog/adoptions).
catalogURL: 'http://catalog'
gleipnirGRPCAddr: 'forge-gleipnir:9090'
gjallarhornURL: 'http://forge-gjallarhorn'
paymentConnection: '' # seed a Gleipnir connection, then set its id here

# Audit to stdout by default; point at Talos to forward events in-cluster.
auditSink: stdout
talosGRPCAddr: 'forge-talos:9090'

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: '1'
    memory: 512Mi
