apiVersion: v1
kind: Service
metadata:
  name: {{ include "adoptions.fullname" . }}
  labels:
    {{- include "adoptions.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "adoptions.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
